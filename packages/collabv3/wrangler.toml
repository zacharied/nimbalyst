# CollabV3 - PartyKit-based sync server
name = "nimbalyst-collabv3"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Pin this worker to the Nimbalyst Cloudflare account so `wrangler deploy`
# refuses to run if you're logged in as a different account. Override
# locally by exporting CLOUDFLARE_ACCOUNT_ID.
account_id = "454b0e55f2d7f9abc0d52d4217ecdc3c"

# Development
[dev]
port = 8790

# Durable Objects
# Personal (user-scoped) rooms
[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "PersonalSessionRoom"

[[durable_objects.bindings]]
name = "INDEX_ROOM"
class_name = "PersonalIndexRoom"

[[durable_objects.bindings]]
name = "PROJECT_SYNC_ROOM"
class_name = "PersonalProjectSyncRoom"

# Team (org-scoped) rooms
[[durable_objects.bindings]]
name = "DOCUMENT_ROOM"
class_name = "TeamDocumentRoom"

[[durable_objects.bindings]]
name = "TRACKER_ROOM"
class_name = "TeamTrackerRoom"

[[durable_objects.bindings]]
name = "TEAM_ROOM"
class_name = "TeamRoom"

# DO migrations - enable SQLite storage
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom", "IndexRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DocumentRoom"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TrackerRoom"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["TeamRoom"]

# v5: ProjectSyncRoom is new (never deployed under old name), so use new name directly
[[migrations]]
tag = "v5"
new_sqlite_classes = ["PersonalProjectSyncRoom"]
renamed_classes = [
  { from = "SessionRoom", to = "PersonalSessionRoom" },
  { from = "IndexRoom", to = "PersonalIndexRoom" },
  { from = "DocumentRoom", to = "TeamDocumentRoom" },
  { from = "TrackerRoom", to = "TeamTrackerRoom" },
]

# D1 Database (for global user index only)
[[d1_databases]]
binding = "DB"
database_name = "nimbalyst-collabv3"
database_id = "c3b3979d-e20c-4547-a103-91c1a0b32388"

# R2 for session shares
[[r2_buckets]]
binding = "SESSION_SHARES"
bucket_name = "nimbalyst-session-shares"

[[r2_buckets]]
binding = "DOCUMENT_ASSETS"
bucket_name = "nimbalyst-document-assets"

# Analytics Engine for product usage metrics
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "nimbalyst_sync"

# Observability - enables logs, traces, and metrics in Cloudflare dashboard
# Business metrics (auth, team joins, shares) go through Analytics Engine and
# are unaffected by this sampling rate. This only samples per-invocation traces
# used for debugging connection chatter.
[observability]
enabled = true
head_sampling_rate = 0.05  # Sample 5% of requests

# Build-time version injection (overridden by deploy script)
[define]
COLLABV3_VERSION = '"0.0.0-dev"'

# Environment variables
[vars]
ENVIRONMENT = "development"
TEST_AUTH_BYPASS = "true"

# Staging environment
[env.staging]
name = "nimbalyst-collabv3-staging"
[env.staging.define]
COLLABV3_VERSION = '"0.0.0-dev"'
[env.staging.vars]
ENVIRONMENT = "staging"

# Staging R2 bucket for document attachments. Without this binding every
# PUT to /api/collab/docs/.../assets/... fails with "DOCUMENT_ASSETS is
# undefined". Bucket must be created out-of-band:
#   wrangler r2 bucket create nimbalyst-document-assets-staging
[[env.staging.r2_buckets]]
binding = "DOCUMENT_ASSETS"
bucket_name = "nimbalyst-document-assets-staging"

# Production environment
[env.production]
name = "nimbalyst-collabv3"
routes = [
  { pattern = "sync.nimbalyst.com", custom_domain = true },
  { pattern = "share.nimbalyst.com", custom_domain = true }
]

# Production Durable Objects
# Personal (user-scoped) rooms
[[env.production.durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "PersonalSessionRoom"

[[env.production.durable_objects.bindings]]
name = "INDEX_ROOM"
class_name = "PersonalIndexRoom"

[[env.production.durable_objects.bindings]]
name = "PROJECT_SYNC_ROOM"
class_name = "PersonalProjectSyncRoom"

# Team (org-scoped) rooms
[[env.production.durable_objects.bindings]]
name = "DOCUMENT_ROOM"
class_name = "TeamDocumentRoom"

[[env.production.durable_objects.bindings]]
name = "TRACKER_ROOM"
class_name = "TeamTrackerRoom"

[[env.production.durable_objects.bindings]]
name = "TEAM_ROOM"
class_name = "TeamRoom"

# Production Analytics Engine
[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "nimbalyst_sync"

# Production R2 for session shares
[[env.production.r2_buckets]]
binding = "SESSION_SHARES"
bucket_name = "nimbalyst-session-shares"

[[env.production.r2_buckets]]
binding = "DOCUMENT_ASSETS"
bucket_name = "nimbalyst-document-assets"

# Production D1 Database
[[env.production.d1_databases]]
binding = "DB"
database_name = "nimbalyst-collabv3"
database_id = "c3b3979d-e20c-4547-a103-91c1a0b32388"

# Production migrations
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom", "IndexRoom"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["DocumentRoom"]

[[env.production.migrations]]
tag = "v3"
new_sqlite_classes = ["TrackerRoom"]

[[env.production.migrations]]
tag = "v4"
new_sqlite_classes = ["TeamRoom"]

# v5: ProjectSyncRoom is new (never deployed under old name), so use new name directly
[[env.production.migrations]]
tag = "v5"
new_sqlite_classes = ["PersonalProjectSyncRoom"]
renamed_classes = [
  { from = "SessionRoom", to = "PersonalSessionRoom" },
  { from = "IndexRoom", to = "PersonalIndexRoom" },
  { from = "DocumentRoom", to = "TeamDocumentRoom" },
  { from = "TrackerRoom", to = "TeamTrackerRoom" },
]

[env.production.define]
COLLABV3_VERSION = '"0.0.0-dev"'
[env.production.vars]
ENVIRONMENT = "production"
TEST_AUTH_BYPASS = "false"
STYTCH_PROJECT_ID = "project-live-70b810e0-b201-4cf4-b8e8-2b694fd4515f"
ALLOWED_ORIGINS = "https://app.nimbalyst.com,https://nimbalyst.com,capacitor://localhost"
STYTCH_PUBLIC_TOKEN = "public-token-live-db5dfb0e-6423-4166-8366-164f4138e0ff"
